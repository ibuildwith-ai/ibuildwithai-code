<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161616"/>
      <stop offset="100%" style="stop-color:#0e0e0e"/>
    </linearGradient>
    <linearGradient id="greenFade2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="280" fill="url(#bg2)"/>

  <!-- Subtle dot pattern -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#22c55e"/>
    </pattern>
    <rect width="600" height="280" fill="url(#dots)"/>
  </g>

  <!-- Green glow -->
  <ellipse cx="300" cy="140" rx="220" ry="110" fill="url(#greenFade2)"/>

  <!-- Main article document -->
  <rect x="180" y="30" width="240" height="220" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Article header area -->
  <rect x="200" y="50" width="200" height="6" rx="3" fill="#22c55e" opacity="0.7"/>
  <rect x="200" y="64" width="160" height="6" rx="3" fill="#22c55e" opacity="0.4"/>

  <!-- Author line -->
  <circle cx="208" cy="88" r="8" fill="#2a2a2a"/>
  <rect x="222" y="84" width="80" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="222" y="92" width="50" height="3" rx="1.5" fill="#2a2a2a" opacity="0.5"/>

  <!-- Divider -->
  <line x1="200" y1="108" x2="400" y2="108" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Article body text lines -->
  <rect x="200" y="120" width="200" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="200" y="130" width="185" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="200" y="140" width="195" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="200" y="150" width="170" height="4" rx="2" fill="#2a2a2a"/>

  <!-- Paragraph gap -->
  <rect x="200" y="166" width="200" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="200" y="176" width="190" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="200" y="186" width="175" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="200" y="196" width="195" height="4" rx="2" fill="#2a2a2a"/>
  <rect x="200" y="206" width="140" height="4" rx="2" fill="#2a2a2a"/>

  <!-- Citation highlight -->
  <rect x="196" y="163" width="3" height="50" rx="1.5" fill="#22c55e" opacity="0.4"/>

  <!-- Reference numbers -->
  <text x="393" y="124" font-family="DM Sans, sans-serif" font-size="8" fill="#22c55e" opacity="0.6">[1]</text>
  <text x="368" y="154" font-family="DM Sans, sans-serif" font-size="8" fill="#22c55e" opacity="0.6">[2]</text>
  <text x="390" y="180" font-family="DM Sans, sans-serif" font-size="8" fill="#22c55e" opacity="0.6">[3]</text>

  <!-- Style guide panel (left) -->
  <g transform="translate(55, 55)">
    <rect width="100" height="140" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1" opacity="0.8"/>

    <text x="14" y="22" font-family="DM Sans, sans-serif" font-size="9" fill="#666" font-weight="500">Style Guide</text>

    <!-- Style settings -->
    <rect x="14" y="34" width="72" height="3" rx="1.5" fill="#22c55e" opacity="0.3"/>
    <rect x="14" y="44" width="60" height="3" rx="1.5" fill="#2a2a2a" opacity="0.6"/>
    <rect x="14" y="54" width="68" height="3" rx="1.5" fill="#2a2a2a" opacity="0.6"/>

    <!-- Tone indicator -->
    <text x="14" y="76" font-family="DM Sans, sans-serif" font-size="8" fill="#666">Tone</text>
    <rect x="14" y="82" width="72" height="8" rx="4" fill="#2a2a2a" opacity="0.4"/>
    <rect x="14" y="82" width="48" height="8" rx="4" fill="#22c55e" opacity="0.25"/>
    <circle cx="62" cy="86" r="4" fill="#22c55e" opacity="0.6"/>

    <!-- Format pills -->
    <text x="14" y="108" font-family="DM Sans, sans-serif" font-size="8" fill="#666">Format</text>
    <rect x="14" y="114" width="35" height="14" rx="7" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="31" y="124" font-family="DM Sans, sans-serif" font-size="7" fill="#22c55e" text-anchor="middle" opacity="0.8">Blog</text>
    <rect x="54" y="114" width="32" height="14" rx="7" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="70" y="124" font-family="DM Sans, sans-serif" font-size="7" fill="#666" text-anchor="middle">Tech</text>
  </g>

  <!-- Dotted line from style guide to article -->
  <line x1="155" y1="125" x2="180" y2="125" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" opacity="0.25"/>

  <!-- Research panel (right) -->
  <g transform="translate(445, 50)">
    <rect width="105" height="170" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1" opacity="0.8"/>

    <text x="14" y="22" font-family="DM Sans, sans-serif" font-size="9" fill="#666" font-weight="500">Research</text>

    <!-- Source items -->
    <g transform="translate(14, 34)">
      <rect width="77" height="32" rx="4" fill="#2a2a2a" opacity="0.3"/>
      <circle cx="12" cy="16" r="6" fill="#22c55e" opacity="0.2"/>
      <text x="12" y="19" font-family="DM Sans, sans-serif" font-size="7" fill="#22c55e" text-anchor="middle" opacity="0.7">1</text>
      <rect x="24" y="10" width="45" height="3" rx="1.5" fill="#2a2a2a"/>
      <rect x="24" y="18" width="35" height="3" rx="1.5" fill="#2a2a2a" opacity="0.5"/>
    </g>

    <g transform="translate(14, 72)">
      <rect width="77" height="32" rx="4" fill="#2a2a2a" opacity="0.3"/>
      <circle cx="12" cy="16" r="6" fill="#22c55e" opacity="0.2"/>
      <text x="12" y="19" font-family="DM Sans, sans-serif" font-size="7" fill="#22c55e" text-anchor="middle" opacity="0.7">2</text>
      <rect x="24" y="10" width="40" height="3" rx="1.5" fill="#2a2a2a"/>
      <rect x="24" y="18" width="48" height="3" rx="1.5" fill="#2a2a2a" opacity="0.5"/>
    </g>

    <g transform="translate(14, 110)">
      <rect width="77" height="32" rx="4" fill="#2a2a2a" opacity="0.3"/>
      <circle cx="12" cy="16" r="6" fill="#22c55e" opacity="0.2"/>
      <text x="12" y="19" font-family="DM Sans, sans-serif" font-size="7" fill="#22c55e" text-anchor="middle" opacity="0.7">3</text>
      <rect x="24" y="10" width="50" height="3" rx="1.5" fill="#2a2a2a"/>
      <rect x="24" y="18" width="38" height="3" rx="1.5" fill="#2a2a2a" opacity="0.5"/>
    </g>
  </g>

  <!-- Dotted line from research to article -->
  <line x1="420" y1="140" x2="445" y2="135" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" opacity="0.25"/>

  <!-- Progress indicator at bottom of article -->
  <g transform="translate(200, 225)">
    <rect width="200" height="12" rx="6" fill="#2a2a2a" opacity="0.3"/>
    <rect width="140" height="12" rx="6" fill="#22c55e" opacity="0.15"/>
    <text x="100" y="10" font-family="DM Sans, sans-serif" font-size="7" fill="#22c55e" text-anchor="middle" opacity="0.6">Writing in progress...</text>
  </g>
</svg>
